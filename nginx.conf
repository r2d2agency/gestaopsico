server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 200M;

    # Health check for the proxy itself
    location /proxy-health {
        return 200 'Proxy is up';
    }

    # API Proxy
    location /api/ {
        # O resolver 127.0.0.11 é o DNS interno do Docker (obrigatorio para usar variaveis no proxy_pass)
        resolver 127.0.0.11 valid=30s;
        
        # Tenta conectar ao backend pelo nome do serviço no Easypanel.
        # Se o seu serviço de backend tiver outro nome, mude esta variável:
        set $backend_service "whats-agente-psicogest-backend";
        
        # Fallback para localhost se estiver no mesmo container (raro no Easypanel)
        # proxy_pass http://127.0.0.1:3001;
        
        proxy_pass http://$backend_service:3001;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;

        # Timeouts para evitar 504
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Debug headers
        add_header X-Proxy-Target $backend_service always;
        add_header X-Upstream-Status $upstream_status always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}