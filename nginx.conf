server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 200M;

    # Health check for the proxy itself
    location /proxy-health {
        return 200 'Proxy is up';
    }

    # API Proxy
    location /api/ {
        # Em ambientes de container único no Easypanel, 0.0.0.0 ou 127.0.0.1 devem funcionar.
        # Se estiver usando múltiplos serviços, use o nome do serviço (ex: backend:3001)
        proxy_pass http://127.0.0.1:3001;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;

        # Timeouts aumentados para evitar 504/502 prematuros
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Error handling
        proxy_intercept_errors off;

        # Debug headers
        add_header X-Proxy-Target "127.0.0.1:3001" always;
        add_header X-Debug-Status $upstream_status always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}