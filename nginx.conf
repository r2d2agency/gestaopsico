server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 200M;

    # Health check for the proxy itself
    location /proxy-health {
        return 200 'Proxy is up';
    }

    # API Proxy
    location /api/ {
        # Tenta resolver o backend. 
        # No Easypanel, se forem serviços separados, use o nome do serviço do backend.
        # Se estiverem no mesmo container, 127.0.0.1 funciona.
        
        # Tentamos primeiro o hostname comum 'backend', depois o específico sugerido pelos logs,
        # e por fim o localhost como fallback.
        
        resolver 127.0.0.11 valid=30s; # DNS interno do Docker
        
        set $upstream_backend "127.0.0.1";
        
        # Se você souber o nome do serviço no Easypanel, mude aqui:
        # proxy_pass http://whats-agente-psicogest-backend:3001;
        
        proxy_pass http://127.0.0.1:3001;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;

        # Timeouts aumentados
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Debug headers para ver o que está acontecendo
        add_header X-Proxy-Target "127.0.0.1:3001" always;
        add_header X-Upstream-Status $upstream_status always;
        add_header X-Debug-IP $remote_addr always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}